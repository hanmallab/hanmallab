<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="&#54620;&#47568;&#53665;">
  <link rel="manifest" href="manifest.json">
  <title>&#54620;&#47568;&#53665; AAC</title>
  <style>
    :root {
      --primary:       #1565C0;
      --primary-light: #42A5F5;
      --primary-dark:  #0D47A1;
      --bg:            #EEF5FF;
      --card-bg:       #FFFFFF;
      --text:          #1A1A2E;
      --text-muted:    #6B7280;
      --border:        #BBDEFB;
      --strip-bg:      #0D2A52;
      --radius-sm:     10px;
      --radius:        16px;
      --radius-lg:     24px;
      --shadow:        0 2px 10px rgba(21,101,192,0.15);
      --shadow-hover:  0 6px 20px rgba(21,101,192,0.30);
      --nav-h:         60px;
      --c-urgent:   #E53935;
      --c-needs:    #2E7D32;
      --c-response: #6A1B9A;
      --c-feelings: #E65100;
      --c-school:   #1565C0;
      --c-places:   #00695C;
      --c-things:   #4E342E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    #app-header {
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      z-index: 20;
    }
    #app-header h1 { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.3px; }
    #app-header .right { display: flex; gap: 6px; }
    .icon-btn {
      background: rgba(255,255,255,.18);
      border: none; color: #fff;
      padding: 6px 11px; border-radius: 8px;
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
      transition: background .15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.28); }

    /* MAIN */
    #main-content {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; padding-bottom: var(--nav-h);
    }

    /* BOTTOM NAV */
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: #fff; border-top: 2px solid var(--border);
      display: flex; z-index: 30;
      box-shadow: 0 -2px 12px rgba(21,101,192,.1);
    }
    .nav-btn {
      all: unset;
      box-sizing: border-box;
      flex: 1; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; font-size: .68rem; font-weight: 700;
      color: var(--text-muted); transition: color .15s; padding: 6px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-icon { font-size: 1.4rem; line-height: 1; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn.active .nav-icon { transform: scale(1.1); }
    .nav-btn:hover { color: var(--primary); }

    /* MODE PANELS */
    .mode-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .mode-panel[hidden] { display: none !important; }

    /* =====================
       SOTONPAN MODE
    ===================== */
    #output-strip {
      background: var(--strip-bg); padding: 8px 10px;
      display: flex; align-items: center; gap: 8px;
      min-height: 62px; flex-shrink: 0;
    }
    #output-words {
      flex: 1; display: flex; flex-wrap: wrap;
      gap: 5px; align-items: center; min-height: 38px;
    }
    .out-chip {
      background: rgba(255,255,255,.15); color: #fff;
      padding: 5px 10px; border-radius: 20px;
      font-size: .95rem; font-weight: 700;
      display: flex; align-items: center; gap: 4px;
      cursor: pointer; transition: background .15s; user-select: none;
    }
    .out-chip:hover { background: rgba(255,255,255,.25); }
    .chip-emoji { font-size: 1.1rem; }
    .out-placeholder { color: rgba(255,255,255,.38); font-size: .85rem; }
    .strip-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .strip-btn {
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.3); color: #fff;
      width: 42px; height: 42px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 1.15rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .strip-btn:hover { background: rgba(255,255,255,.22); }
    .strip-btn.speak {
      background: #1B5E20; border-color: #43A047; width: 54px; font-size: 1.4rem;
    }
    .strip-btn.speak:hover { background: #2E7D32; }
    .strip-btn.speak.active {
      background: #F57F17; border-color: #FBC02D;
      animation: pulsate .7s ease-in-out infinite;
    }
    @keyframes pulsate {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:.75; transform:scale(.94); }
    }

    #cat-bar {
      background: #fff; display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      border-bottom: 2px solid var(--border); flex-shrink: 0;
    }
    #cat-bar::-webkit-scrollbar { display: none; }
    .cat-tab {
      background: none; border: none;
      padding: 9px 14px; font-size: .8rem; font-weight: 700;
      color: var(--text-muted); white-space: nowrap; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .cat-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .cat-tab:hover:not(.active) { color: var(--primary); background: var(--bg); }

    #grid-wrap { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
    #symbol-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    @media (min-width:640px) { #symbol-grid { grid-template-columns: repeat(5,1fr); } }
    @media (min-width:840px) {
      #symbol-grid { grid-template-columns: repeat(6,1fr); }
      .sym-card { padding: 10px 6px; gap: 5px; }
      .sym-icon { font-size: 3.5rem; }
      .sym-text { font-size: 1.3rem; }
      .sym-sub  { font-size: 1rem; }
    }

    .sym-card {
      background: var(--card-bg); border: 2.5px solid var(--border);
      border-radius: var(--radius); padding: 6px 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; aspect-ratio: 1;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      transition: transform .12s, box-shadow .12s, border-color .12s;
      user-select: none;
    }
    .sym-card::after {
      content:''; position:absolute; inset:0; background:currentColor;
      opacity:0; transition:opacity .12s; border-radius:inherit;
    }
    .sym-card:active::after { opacity:.08; }
    .sym-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-hover); }
    .sym-card:active { transform:scale(.93); }
    .sym-card[data-cat="urgent"]   { border-color:#FFCDD2; }
    .sym-card[data-cat="needs"]    { border-color:#C8E6C9; }
    .sym-card[data-cat="response"] { border-color:#E1BEE7; }
    .sym-card[data-cat="feelings"] { border-color:#FFE0B2; }
    .sym-card[data-cat="school"]   { border-color:#BBDEFB; }
    .sym-card[data-cat="places"]   { border-color:#B2DFDB; }
    .sym-card[data-cat="things"]   { border-color:#D7CCC8; }
    .sym-card:hover[data-cat="urgent"]   { border-color:var(--c-urgent);   box-shadow:0 6px 20px rgba(229,57,53,.25); }
    .sym-card:hover[data-cat="needs"]    { border-color:var(--c-needs);    box-shadow:0 6px 20px rgba(46,125,50,.25); }
    .sym-card:hover[data-cat="response"] { border-color:var(--c-response); box-shadow:0 6px 20px rgba(106,27,154,.25); }
    .sym-card:hover[data-cat="feelings"] { border-color:var(--c-feelings); box-shadow:0 6px 20px rgba(230,81,0,.25); }
    .sym-card:hover[data-cat="school"]   { border-color:var(--c-school);   box-shadow:0 6px 20px rgba(21,101,192,.25); }
    .sym-card:hover[data-cat="places"]   { border-color:var(--c-places);   box-shadow:0 6px 20px rgba(0,105,92,.25); }
    .sym-card:hover[data-cat="things"]   { border-color:var(--c-things);   box-shadow:0 6px 20px rgba(78,52,46,.25); }
    .sym-icon { font-size:1.9rem; line-height:1; }
    .emoji-icon-img { width:1em; height:1em; vertical-align:-0.12em; display:inline-block; }
    .sym-text { font-size:.68rem; font-weight:800; text-align:center; line-height:1.2; }
    .sym-sub  { font-size:.55rem; color:var(--text-muted); text-align:center; line-height:1.2; }
    .cat-label {
      grid-column:1/-1; padding:4px 2px 6px;
      font-size:.72rem; font-weight:800; letter-spacing:.4px;
      text-transform:uppercase; display:flex; align-items:center; gap:6px;
    }
    .cat-label::after { content:''; flex:1; height:2px; background:var(--border); border-radius:2px; }
    .cat-label[data-cat="urgent"]   { color:var(--c-urgent); }
    .cat-label[data-cat="needs"]    { color:var(--c-needs); }
    .cat-label[data-cat="response"] { color:var(--c-response); }
    .cat-label[data-cat="feelings"] { color:var(--c-feelings); }
    .cat-label[data-cat="school"]   { color:var(--c-school); }
    .cat-label[data-cat="places"]   { color:var(--c-places); }
    .cat-label[data-cat="things"]   { color:var(--c-things); }

    /* =====================
       HAKSUP MODE
    ===================== */
    #week-select {
      flex: 1; overflow-y: auto; padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px; align-content: start;
    }
    #week-select.hidden { display: none; }
    @media (min-width:600px) { #week-select { grid-template-columns: repeat(4,1fr); } }

    .week-card {
      background: var(--card-bg); border-radius: var(--radius-lg);
      padding: 20px 14px; cursor: pointer; text-align: center;
      box-shadow: var(--shadow); border: 3px solid transparent;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      user-select: none;
    }
    .week-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
    .week-card:active { transform:scale(.95); }
    .wk-icon  { font-size:2.8rem; margin-bottom:8px; }
    .wk-num   { font-size:.8rem; font-weight:800; opacity:.7; }
    .wk-title { font-size:.88rem; font-weight:800; line-height:1.3; margin-top:4px; }
    .wk-words { font-size:.7rem; color:var(--text-muted); margin-top:6px; line-height:1.6; }
    .week-card[data-week="1"] { border-color:#FFCDD2; }
    .week-card[data-week="2"] { border-color:#C8E6C9; }
    .week-card[data-week="3"] { border-color:#E1BEE7; }
    .week-card[data-week="4"] { border-color:#BBDEFB; }
    .week-card[data-week="1"]:hover { border-color:#E53935; }
    .week-card[data-week="2"]:hover { border-color:#2E7D32; }
    .week-card[data-week="3"]:hover { border-color:#6A1B9A; }
    .week-card[data-week="4"]:hover { border-color:#1565C0; }

    /* DAY SELECT */
    #day-select {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #day-select.active { display: flex; }
    .day-select-header {
      background: var(--primary); color:#fff;
      padding:10px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .day-select-header[data-week="1"] { background:#C62828; }
    .day-select-header[data-week="2"] { background:#1B5E20; }
    .day-select-header[data-week="3"] { background:#4A148C; }
    .day-select-header[data-week="4"] { background:#0D47A1; }
    .day-select-header h2 { font-size:.98rem; font-weight:800; }
    #day-cards {
      flex:1; overflow-y:auto; padding:16px;
      display:grid; grid-template-columns:1fr; gap:12px; align-content:start;
    }
    @media (min-width:600px) { #day-cards { grid-template-columns:repeat(3,1fr); } }
    .day-card {
      background: var(--card-bg); border-radius: var(--radius-lg);
      padding: 16px; cursor: pointer; text-align:left;
      box-shadow: var(--shadow); border:3px solid var(--border);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      user-select:none; display:flex; align-items:center; gap:12px;
    }
    .day-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); border-color:var(--primary); }
    .day-card:active { transform:scale(.97); }
    .day-card.is-review { background:#FFF8E1; border-color:#FFE082; }
    .day-card.is-review:hover { border-color:#F57F17; }
    .dc-num {
      width:42px; height:42px; border-radius:50%; background:var(--primary); color:#fff;
      display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.05rem;
      flex-shrink:0;
    }
    .day-card.is-review .dc-num { background:#F57F17; }
    .dc-title { font-size:.92rem; font-weight:800; margin-bottom:3px; }
    .dc-words { font-size:.72rem; color:var(--text-muted); line-height:1.5; }

    #lesson-view {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #lesson-view.active { display: flex; }

    .lesson-header {
      background: var(--primary); color: #fff;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .lesson-header[data-week="1"] { background:#C62828; }
    .lesson-header[data-week="2"] { background:#1B5E20; }
    .lesson-header[data-week="3"] { background:#4A148C; }
    .lesson-header[data-week="4"] { background:#0D47A1; }
    .back-btn {
      background:rgba(255,255,255,.2); border:none; color:#fff;
      width:34px; height:34px; border-radius:8px; cursor:pointer;
      font-size:1.2rem; display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .back-btn:hover { background:rgba(255,255,255,.32); }
    .lesson-hdr-text h2 { font-size:.98rem; font-weight:800; }
    .lesson-hdr-text p  { font-size:.74rem; opacity:.8; margin-top:2px; }

    .lesson-tabs {
      background:#fff; display:flex;
      border-bottom:2px solid var(--border); flex-shrink:0;
    }
    .lesson-tab {
      flex:1; background:none; border:none; padding:8px 2px;
      font-size:.64rem; font-weight:700; color:var(--text-muted);
      cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px;
      display:flex; flex-direction:column; align-items:center; gap:2px;
      transition:color .15s; white-space:nowrap;
    }
    .tab-icon { font-size:.95rem; }
    .lesson-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
    .lesson-tab:hover:not(.active) { color:var(--primary); }

    .tab-content { flex:1; overflow-y:auto; }
    .tab-panel { display:none; padding:16px; }
    .tab-panel.active { display:block; }

    /* FLASHCARD */
    .flashcard-nav {
      display:flex; align-items:center; justify-content:center;
      gap:12px; margin-bottom:14px;
    }
    .fc-counter { font-size:.85rem; font-weight:700; color:var(--text-muted); }
    .fc-arr {
      background:var(--primary); color:#fff; border:none;
      width:38px; height:38px; border-radius:50%;
      font-size:1.1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s;
    }
    .fc-arr:hover { background:var(--primary-dark); }
    .fc-arr:disabled { background:#ccc; cursor:default; }
    .flashcard {
      background:var(--card-bg); border-radius:var(--radius-lg);
      padding:32px 24px; text-align:center; box-shadow:var(--shadow);
      cursor:pointer; min-height:200px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px; margin-bottom:14px;
      transition:transform .15s;
    }
    .flashcard:hover { transform:scale(1.02); }
    .fc-emoji { font-size:4.5rem; line-height:1; }
    .fc-word  { font-size:2rem; font-weight:900; color:var(--primary); }
    .fc-trans { font-size:1rem; color:var(--text-muted); }
    .fc-hint  { font-size:.75rem; color:var(--text-muted); margin-top:6px; }
    .fc-speak-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      background:var(--primary); color:#fff; border:none;
      padding:12px 24px; border-radius:30px;
      font-size:.9rem; font-weight:700; cursor:pointer;
      width:100%; max-width:300px; margin:0 auto 20px;
      transition:background .15s;
    }
    .fc-speak-btn:hover { background:var(--primary-dark); }
    .vocab-list {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:10px;
    }
    .vocab-item {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius); padding:10px 6px; text-align:center;
      cursor:pointer; transition:border-color .15s, transform .12s;
    }
    .vocab-item:hover { border-color:var(--primary); transform:translateY(-2px); }
    .vocab-item.active-fc { border-color:var(--primary); background:var(--bg); }
    .vi-emoji { font-size:1.8rem; }
    .vi-text  { font-size:.73rem; font-weight:800; margin-top:3px; }

    /* DIALOGUE */
    .dialogue-nav {
      display:flex; gap:8px; margin-bottom:14px;
      overflow-x:auto; scrollbar-width:none; padding-bottom:4px;
    }
    .dialogue-nav::-webkit-scrollbar { display:none; }
    .dlg-nav-btn {
      background:var(--bg); border:2px solid var(--border);
      border-radius:20px; padding:6px 14px;
      font-size:.78rem; font-weight:700; cursor:pointer;
      white-space:nowrap; transition:border-color .15s, background .15s;
    }
    .dlg-nav-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .dlg-situation {
      background:var(--primary); color:#fff;
      padding:7px 14px; border-radius:8px;
      font-size:.8rem; font-weight:700;
      display:inline-block; margin-bottom:14px;
    }
    .dialogue-box { display:flex; flex-direction:column; gap:12px; }
    .dlg-line { display:flex; gap:10px; align-items:flex-start; }
    .dlg-line.teacher { flex-direction:row-reverse; }
    .dlg-avatar {
      width:36px; height:36px; border-radius:50%;
      background:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; flex-shrink:0;
    }
    .dlg-line.teacher .dlg-avatar { background:#C62828; }
    .dlg-bubble {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius); padding:11px 13px; max-width:78%;
    }
    .dlg-line.teacher .dlg-bubble { background:#FFF3F3; border-color:#FFCDD2; }
    .dlg-text { font-size:.95rem; font-weight:700; margin-bottom:3px; }
    .dlg-tr   { font-size:.78rem; color:var(--text-muted); margin-bottom:4px; }
    .dlg-tts  {
      background:none; border:1.5px solid var(--border);
      border-radius:14px; padding:3px 10px;
      font-size:.72rem; cursor:pointer; color:var(--primary); font-weight:700;
    }
    .dlg-tts:hover { background:var(--bg); }

    /* SITUATION */
    .situation-card {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius-lg); padding:16px; margin-bottom:14px;
      display:flex; gap:14px; align-items:flex-start;
    }
    .sit-emoji { font-size:2.4rem; flex-shrink:0; line-height:1; }
    .sit-body  { flex:1; min-width:0; }
    .sit-word  { font-size:1.05rem; font-weight:900; color:var(--primary); margin-bottom:5px; }
    .sit-text  { font-size:.92rem; font-weight:600; margin-bottom:5px; line-height:1.4; }
    .sit-tr    { font-size:.78rem; color:var(--text-muted); margin-bottom:9px; }

    /* APPLY */
    .apply-card {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius-lg); padding:16px; margin-bottom:14px;
    }
    .apply-word {
      display:inline-block; background:var(--primary); color:#fff;
      font-size:.72rem; font-weight:700; padding:4px 11px;
      border-radius:14px; margin-bottom:9px;
    }
    .apply-sentence { font-size:1.05rem; font-weight:800; margin-bottom:5px; line-height:1.4; }
    .apply-tr       { font-size:.8rem; color:var(--text-muted); margin-bottom:9px; }

    /* SONG */
    .song-banner {
      background:linear-gradient(135deg,#1565C0,#42A5F5);
      border-radius:var(--radius-lg); padding:24px 20px;
      color:#fff; text-align:center; margin-bottom:14px;
    }
    .song-banner-icon  { font-size:3rem; margin-bottom:6px; }
    .song-banner-title { font-size:1.2rem; font-weight:900; }
    .song-banner-sub   { font-size:.82rem; opacity:.8; margin-top:4px; }
    .audio-wrap {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius); padding:16px; margin-bottom:14px;
    }
    .audio-wrap audio { width:100%; border-radius:8px; }
    .audio-note {
      text-align:center; padding:16px 8px;
      color:var(--text-muted); font-size:.82rem; margin-top:8px;
    }
    .audio-path {
      font-size:.7rem; font-family:monospace;
      background:var(--bg); padding:4px 8px; border-radius:6px;
      margin-top:6px; display:inline-block; color:var(--primary);
    }
    .lyrics-box {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius); padding:20px;
    }
    .lyrics-box h3 { font-size:.82rem; color:var(--text-muted); margin-bottom:12px; font-weight:700; }
    .lyrics-box pre {
      font-family:inherit; font-size:.95rem; font-weight:700;
      line-height:2.2; white-space:pre-wrap; color:var(--text);
    }

    /* GAME */
    .game-topbar {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    .game-topbar h3 { font-size:.95rem; font-weight:800; }
    .game-restart {
      background:var(--primary); color:#fff; border:none;
      padding:7px 14px; border-radius:20px;
      font-size:.78rem; font-weight:700; cursor:pointer;
    }
    .game-restart:hover { background:var(--primary-dark); }
    .score-bar {
      background:var(--card-bg); border:2px solid var(--border);
      border-radius:var(--radius); padding:9px 14px;
      display:flex; gap:20px; margin-bottom:12px;
      font-size:.84rem; font-weight:700;
    }
    .score-bar span { color:var(--primary); }
    .game-grid {
      display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    }
    @media (max-width:360px) { .game-grid { grid-template-columns:repeat(3,1fr); } }
    .game-card {
      aspect-ratio:1; cursor:pointer; border-radius:var(--radius);
      position:relative;
    }
    .game-card.matched  { opacity:.45; cursor:default; pointer-events:none; }
    .gc-front, .gc-back {
      position:absolute; inset:0; border-radius:var(--radius);
      display:flex; align-items:center; justify-content:center;
      font-weight:800; box-shadow:var(--shadow);
      transition:opacity .25s;
    }
    .gc-front {
      background:var(--primary); color:#fff; font-size:1.4rem;
      opacity:1; z-index:2;
    }
    .gc-back {
      background:var(--card-bg); border:2.5px solid var(--border);
      padding:6px; text-align:center;
      font-size:.85rem; line-height:1.3;
      opacity:0; z-index:1;
    }
    .gc-back.is-emoji { font-size:2rem; }
    .game-card.flipped .gc-front { opacity:0; z-index:1; }
    .game-card.flipped .gc-back  { opacity:1; z-index:2; }
    #game-result {
      text-align:center; margin-top:18px;
      font-size:1.1rem; font-weight:800; color:var(--primary);
    }

    /* TEACHER MODE */
    #teacher-overlay {
      display:none; position:fixed; inset:0;
      background:#0D2A52; z-index:200;
      flex-direction:column; align-items:center; justify-content:center; padding:20px;
    }
    #teacher-overlay.open { display:flex; }
    .teacher-close {
      position:absolute; top:14px; right:14px;
      background:rgba(255,255,255,.15); border:none; color:#fff;
      padding:7px 14px; border-radius:8px;
      font-size:.82rem; font-weight:700; cursor:pointer;
    }
    .teacher-close:hover { background:rgba(255,255,255,.26); }
    .teacher-label {
      color:rgba(255,255,255,.5); font-size:.78rem; font-weight:700;
      letter-spacing:1px; margin-bottom:18px;
    }
    #teacher-card {
      background:#fff; border-radius:28px;
      width:min(82vw,320px); aspect-ratio:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      padding:20px;
    }
    .tc-emoji { font-size:5.5rem; line-height:1; }
    .tc-text  { font-size:2.2rem; font-weight:900; color:var(--primary); text-align:center; }
    .tc-trans { font-size:.95rem; color:var(--text-muted); text-align:center; }
    .teacher-nav {
      display:flex; align-items:center; gap:22px; margin-top:24px;
    }
    .t-arr {
      background:rgba(255,255,255,.15); border:none; color:#fff;
      width:52px; height:52px; border-radius:50%; font-size:1.4rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .15s;
    }
    .t-arr:hover { background:rgba(255,255,255,.28); }
    .t-arr:disabled { opacity:.25; cursor:default; }
    .teacher-counter {
      color:rgba(255,255,255,.7); font-size:.9rem; font-weight:700;
      min-width:56px; text-align:center;
    }
    .teacher-speak {
      margin-top:14px; background:#1B5E20; border:none; color:#fff;
      padding:11px 28px; border-radius:30px;
      font-size:.9rem; font-weight:700; cursor:pointer;
      transition:background .15s;
    }
    .teacher-speak:hover { background:#2E7D32; }

    /* SETTINGS */
    #settings-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:100;
      align-items:center; justify-content:center;
    }
    #settings-overlay.open { display:flex; }
    #settings-box {
      background:#fff; border-radius:var(--radius-lg);
      padding:24px 22px; width:92%; max-width:420px;
      max-height:85vh; overflow-y:auto;
      box-shadow:0 16px 48px rgba(0,0,0,.25);
    }
    #settings-box h2 { font-size:1.1rem; color:var(--primary); margin-bottom:18px; }
    .s-item { margin-bottom:18px; }
    .s-item label { display:block; font-size:.85rem; font-weight:700; margin-bottom:6px; }
    .s-item select, .s-item input[type="range"] { width:100%; }
    .s-item select {
      padding:8px 10px; border:2px solid var(--border);
      border-radius:var(--radius-sm); font-size:.9rem; outline:none;
    }
    .s-item select:focus { border-color:var(--primary); }
    .range-row { display:flex; align-items:center; gap:10px; }
    .range-row input { flex:1; accent-color:var(--primary); }
    .range-val { min-width:36px; text-align:right; font-size:.85rem; font-weight:700; color:var(--primary); }
    .s-close {
      display:block; width:100%; padding:13px;
      background:var(--primary); color:#fff; border:none;
      border-radius:var(--radius-sm); font-size:1rem; font-weight:700;
      cursor:pointer; margin-top:6px;
    }
    .s-close:hover { background:var(--primary-dark); }

    /* FONT SIZE */
    body.font-large .sym-icon { font-size:3rem; }
    body.font-large .sym-text { font-size:.88rem; }
    body.font-small .sym-icon { font-size:1.8rem; }
    body.font-small .sym-text { font-size:.65rem; }

    /* RIPPLE */
    .ripple {
      position:absolute; border-radius:50%; transform:scale(0);
      animation:ripple-anim .4s linear;
      background:rgba(21,101,192,.2); pointer-events:none;
    }
    @keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

    /* TOAST */
    #toast {
      position:fixed; bottom:76px; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:#323232; color:#fff;
      padding:10px 20px; border-radius:24px;
      font-size:.85rem; font-weight:600;
      z-index:201; transition:transform .3s; pointer-events:none;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>

function renderGrid(cat) {
  const grid = document.getElementById('symbol-grid');
  let html = '';
  if (cat === 'all') {
    for (const c of CATEGORIES) {
      VOCAB.filter(v => v.cat === c.id).forEach(v => { html += cardHTML(v); });
    }
  } else {
    VOCAB.filter(v => v.cat === cat).forEach(v => { html += cardHTML(v); });
  }
  grid.innerHTML = html;
}

function cardHTML(v) {
  const sub = transLang !== 'none' && v.tr[transLang] ? v.tr[transLang] : '';
  return `<div class="sym-card" data-id="${v.id}" data-cat="${v.cat}" onclick="handleCard(event,${v.id})">
    <span class="sym-icon">${v.emoji}</span>
    <span class="sym-text">${v.text}</span>
    ${sub ? `<span class="sym-sub">${sub}</span>` : ''}
  </div>`;
}

function renderOutput() {
  const el = document.getElementById('output-words');
  if (!sentence.length) {
    el.innerHTML = '<span class="out-placeholder">\ub2e8\uc5b4\ub97c \ub180\ub7ec \ubb38\uc7a5\uc744 \ub9cc\ub4dc\uc138\uc694</span>';
    return;
  }
  el.innerHTML = sentence.map((w,i) =>
    `<span class="out-chip" onclick="removeWord(${i})"><span class="chip-emoji">${w.emoji}</span>${w.text}</span>`
  ).join('');
}

function handleCard(evt, id) {
  addRipple(evt);
  const v = VOCAB.find(x => x.id === id);
  if (!v) return;
  sentence.push(v); renderOutput(); speakWord(v.text);
}

function addRipple(evt) {
  const card = evt.currentTarget;
  const r = document.createElement('span');
  const rect = card.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.className = 'ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${evt.clientX-rect.left-size/2}px;top:${evt.clientY-rect.top-size/2}px;`;
  card.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function removeWord(idx) { sentence.splice(idx,1); renderOutput(); }
function backspace()     { if (sentence.length) { sentence.pop(); renderOutput(); } }
function clearOutput()   { sentence = []; renderOutput(); }

function setCategory(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));

}

function renderGameTab() { initGame(); }

function initGame() {
  const items = currentDay.vocabIds.slice(0,4).map(id => VOCAB.find(v=>v.id===id));
  gameCards = []; matched = 0; moves = 0; flipped = []; canFlip = true;
  items.forEach((v,i) => {
    gameCards.push({id:i*2,   pairId:i, type:'emoji', content:v.emoji, word:v.text});
    gameCards.push({id:i*2+1, pairId:i, type:'word',  content:v.text,  word:v.text});
  });
  for (let i = gameCards.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [gameCards[i], gameCards[j]] = [gameCards[j], gameCards[i]];
  }
  renderGameBoard();
}

function renderGameBoard() {
  const total = gameCards.length/2;
  const cards = gameCards.map((card,idx) =>
    `<div class="game-card" data-idx="${idx}" onclick="flipCard(${idx})">
      <div class="gc-front">?</div>
      <div class="gc-back ${card.type==='emoji'?'is-emoji':''}">${card.content}</div>
    </div>`
  ).join('');
  document.getElementById('tab-game').innerHTML = `
    <div class="game-topbar">
      <h3>&#127918; &#51937; &#47582;&#52628;&#44592;</h3>
      <button class="game-restart" onclick="initGame()">&#8635; &#45796;&#49884;&#54616;&#44592;</button>
    </div>
    <div class="score-bar">
      <div>&#49884;&#46020;: <span id="moves-count">${moves}</span></div>
      <div>&#47582;&#52632;: <span id="matched-count">${matched}</span> / ${total}</div>
    </div>
    <div class="game-grid" id="game-grid">${cards}</div>
    <div id="game-result"></div>`;
}

function flipCard(idx) {
  if (!canFlip) return;
  const el = document.querySelector(`.game-card[data-idx="${idx}"]`);
  if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  flipped.push(idx);
  speakWord(gameCards[idx].word);
  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves-count').textContent = moves;
    canFlip = false;
    const [a, b] = flipped;
    const ga = gameCards[a], gb = gameCards[b];
    if (ga.pairId === gb.pairId && ga.type !== gb.type) {
      setTimeout(() => {
        document.querySelector(`.game-card[data-idx="${a}"]`).classList.add('matched');
        document.querySelector(`.game-card[data-idx="${b}"]`).classList.add('matched');
        matched++;
        document.getElementById('matched-count').textContent = matched;
        flipped = []; canFlip = true;
        if (matched === gameCards.length/2) {
          document.getElementById('game-result').textContent = '\ud83c\udf89 \uc644\ub8cc! ' + moves + '\ubc88 \ub9cc\uc5d0 \ub9de\ucde4\uc5b4\uc694!';
          showToast('\uc798\ud588\uc5b4\uc694! \ud83c\udf89');
        }
      }, 600);
    } else {
      setTimeout(() => {
        document.querySelector(`.game-card[data-idx="${a}"]`).classList.remove('flipped');
        document.querySelector(`.game-card[data-idx="${b}"]`).classList.remove('flipped');
        flipped = []; canFlip = true;
      }, 900);
    }
  }
}

function closeTeacherMode() {
  document.getElementById('teacher-overlay').classList.remove('open');
}
function renderTeacherCard() {
  const v = teacherVocabList[teacherIdx];
  const tr = transLang !== 'none' && v.tr[transLang] ? v.tr[transLang] : (v.tr.en || '');
  document.querySelector('#teacher-card .tc-emoji').innerHTML = v.emoji;
  document.querySelector('#teacher-card .tc-text').textContent  = v.text;
  document.querySelector('#teacher-card .tc-trans').textContent = tr;
  document.getElementById('teacher-counter').textContent = `${teacherIdx+1} / ${teacherVocabList.length}`;
  document.getElementById('t-prev').disabled = teacherIdx === 0;
  document.getElementById('t-next').disabled = teacherIdx === teacherVocabList.length-1;
}
function teacherNav(dir) {
  teacherIdx = Math.max(0, Math.min(teacherVocabList.length-1, teacherIdx+dir));
  renderTeacherCard();
}
function teacherSpeak() { speakWord(teacherVocabList[teacherIdx].text); }

// ============================================
//  TTS
// ============================================
function speakWord(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = voiceLang; u.rate = speechRate;
  window.speechSynthesis.speak(u);
}
function speakSentence() {
  if (!sentence.length) { showToast('\uba3c\uc800 \ub2e8\uc5b4\ub97c \uc120\ud0dd\ud558\uc138\uc694'); return; }
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(sentence.map(w=>w.text).join(' '));
  u.lang = voiceLang; u.rate = speechRate;
  const btn = document.getElementById('speakBtn');
  btn.classList.add('active');
  u.onend = u.onerror = () => btn.classList.remove('active');
  window.speechSynthesis.speak(u);
}

// ============================================
//  SETTINGS
// ============================================
function openSettings()  { document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target.id === 'settings-overlay') closeSettings(); }
function setRate(val) { speechRate = parseFloat(val); document.getElementById('rateDisplay').textContent = parseFloat(val).toFixed(1); }
function setVoiceLang(val) { voiceLang = val; }
function setTransLang(val) {
  transLang = val;
  renderGrid(currentCat);
  if (currentDay) {
    if (currentLessonTab === 'vocab')     renderVocabTab();
    if (currentLessonTab === 'situation') renderSituationTab();
    if (currentLessonTab === 'dialogue')  renderDialogueContent();
    if (currentLessonTab === 'apply')     renderApplyTab();
  }
  if (document.getElementById('teacher-overlay').classList.contains('open')) renderTeacherCard();
}
function setFontSize(val) {
  document.body.classList.remove('font-small','font-large');
  if (val !== 'medium') document.body.classList.add('font-'+val);
}

// ============================================
//  TOAST
// ============================================
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================
//  PWA
// ============================================
let deferredInstall;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstall = e;
  document.getElementById('installBtn').style.display = 'flex';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBtn').style.display = 'none';
    showToast('\uc571\uc774 \uc124\uce58\ub418\uc5c8\uc2b5\ub2c8\ub2e4!');
  }
  deferredInstall = null;
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ============================================
//  INIT
// ============================================
renderGrid('all');
renderOutput();
renderWeekSelect();
</script>
</body>
</html>
