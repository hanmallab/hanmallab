<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#54620;&#47568;&#53397; &#47196;&#44536;&#51064;</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: #EEF5FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(21,101,192,.18);
      text-align: center;
    }
    .logo { font-size: 3rem; margin-bottom: 12px; }
    h1 { font-size: 1.4rem; font-weight: 900; color: #1565C0; margin-bottom: 4px; }
    .sub { font-size: .85rem; color: #6B7280; margin-bottom: 32px; }
    label { display: block; text-align: left; font-size: .82rem; font-weight: 700; color: #374151; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 13px 16px;
      border: 2px solid #BBDEFB; border-radius: 12px;
      font-size: 1rem; outline: none;
      transition: border-color .15s;
      margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: #1565C0; }
    button {
      width: 100%; padding: 14px;
      background: #1565C0; color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: background .15s;
    }
    button:hover { background: #0D47A1; }
    button:disabled { background: #90CAF9; cursor: default; }
    .error {
      display: none; margin-top: 14px;
      background: #FFEBEE; color: #C62828;
      padding: 10px 16px; border-radius: 10px;
      font-size: .85rem; font-weight: 600;
    }
    .error.show { display: block; }
    .back { margin-top: 20px; font-size: .82rem; }
    .back a { color: #1565C0; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">&#128483;</div>
  <h1>&#54620;&#47568;&#53397;</h1>
  <p class="sub">&#44288;&#47532;&#51088; &#47196;&#44536;&#51064;</p>
  <form id="loginForm">
    <label>&#48708;&#48128;&#48264;&#54840;</label>
    <input type="password" id="pw" placeholder="&#48708;&#48128;&#48264;&#54840; &#51077;&#47141;" autocomplete="current-password">
    <button type="submit" id="btn">&#47196;&#44536;&#51064;</button>
    <div class="error" id="err">&#48708;&#48128;&#48264;&#54840;&#44032; &#53480;&#47824;&#50836;. &#45796;&#49884; &#54869;&#51064;&#54616;&#49464;&#50836;.</div>
  </form>
  <p class="back"><a href="/">&larr; &#54200;&#51060;&#51648;&#47196; &#46027;&#50500;&#44032;&#44592;</a></p>
</div>
<script>
  const params = new URLSearchParams(location.search)
  const next = params.get('next') || '/hanmaltok'

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault()
    const btn = document.getElementById('btn')
    const pw  = document.getElementById('pw').value.trim()
    if (!pw) return

    btn.disabled = true
    btn.textContent = '...'

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      })
      if (res.ok) {
        location.href = next
      } else {
        document.getElementById('err').classList.add('show')
        document.getElementById('pw').value = ''
        document.getElementById('pw').focus()
        btn.disabled = false
        btn.textContent = '&#47196;&#44536;&#51064;'
      }
    } catch {
      btn.disabled = false
      btn.textContent = '&#47196;&#44536;&#51064;'
    }
  })
</script>
</body>
</html>
