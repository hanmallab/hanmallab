  <script>
    // ── 게시글 데이터 ──────────────────────────────────────────────
    // 새 게시글 추가 시: 아래 객체에 번호 키로 추가하세요
    // notice.html 의 목록에도 동일하게 추가해야 합니다
    const posts = {
      2: {
        title: '2026 한말톡 한국어 온라인 설명회',
        date:  '2026.04.01',
        image: './공지사항/온라인 설명회.png',
        body:  '작년 한 해 이주배경한말연구소 \'한말톡 한국어 교재\'에 보내주신 뜨거운 성원과 소중한 현장의 목소리를 담아, 드디어 [한말톡 한국어 교재 개정판]이 곧 출간됩니다!\n\n현장에서 이주배경학생들을 직접 지도하시는 선생님들의 고민을 덜어드리고자, 개정된 교재를 소개하고 효과적인 활용법을 나누는 온라인 설명회를 개최합니다.\n\n🚩 신청 구글폼 링크\nhttps://forms.gle/6Hr9esiYnPTFucex7\n\n✅ 이런 분들께 추천합니다!\n이주배경학생을 지도하는 현직 교사 및 강사\n다문화 교육 및 한국어 교육 유관기관 관계자\n\n🎁 참가자 특별 혜택\nBenefit 01. 참석자 전원에게 개정판 교재 PDF 파일 증정 (최초 공개)\nBenefit 02. 참가자 중 추첨을 통해 실물 교재 무료 배송\n\n📅 행사 정보\n일시: 2026년 4월 13일 (월) 19:00 - 20:00\n장소: 온라인 ZOOM (신청 시 개별 링크 발송)\n참가비: 무료\n\n✉️ 문의 및 안내\n홈페이지: www.hanmallab.kr\n이메일: hanmallab@gmail.com'
      },
      1: {
        title: '이주배경한말연구소 홈페이지를 오픈하였습니다',
        date:  '2026.03.25',
        body:  '이주배경학생 교육 지원을 위한 이주배경한말연구소 공식 홈페이지가 개설되었습니다.\n\n앞으로 연구소의 활동, 교재 정보, 공지사항 등을 이 곳에서 안내드리겠습니다.\n\n많은 관심과 응원 부탁드립니다.'
      },
    };

    // ── URL에서 id 읽기 ────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const id     = parseInt(params.get('id'));
    const post   = posts[id];
    const ids    = Object.keys(posts).map(Number).sort((a, b) => a - b);

    if (!post) {
      document.getElementById('post-title').textContent = '게시글을 찾을 수 없습니다.';
    } else {
      document.title = post.title + ' — 이주배경한말연구소';
      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-date').textContent  = post.date;

      // 이미지
      if (post.image) {
        const imgEl = document.createElement('img');
        imgEl.src = post.image;
        imgEl.alt = post.title;
        imgEl.className = 'w-full rounded-xl border border-border mb-8';
        document.getElementById('post-body').before(imgEl);
      }

      document.getElementById('post-body').innerHTML =
        post.body.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');

      // 이전/다음 버튼
      const idx  = ids.indexOf(id);
      const prev = ids[idx - 1];
      const next = ids[idx + 1];

      if (prev) {
        const btnPrev = document.getElementById('btn-prev');
        btnPrev.href = `notice-detail.html?id=${prev}`;
        btnPrev.classList.remove('hidden');
        btnPrev.classList.add('inline-flex');
      }
      if (next) {
        const btnNext = document.getElementById('btn-next');
        btnNext.href = `notice-detail.html?id=${next}`;
        btnNext.classList.remove('hidden');
        btnNext.classList.add('inline-flex');
      }
    }

    // ── 모바일 메뉴 ────────────────────────────────────────────────
    const menuBtn    = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const iconOpen   = document.getElementById('icon-open');
    const iconClose  = document.getElementById('icon-close');
    let menuOpen = false;
    menuBtn.addEventListener('click', () => {
      menuOpen = !menuOpen;
      mobileMenu.classList.toggle('hidden', !menuOpen);
      iconOpen.classList.toggle('hidden', menuOpen);
      iconClose.classList.toggle('hidden', !menuOpen);
    });
    function closeMobileMenu() {
      menuOpen = false;
      mobileMenu.classList.add('hidden');
      iconOpen.classList.remove('hidden');
      iconClose.classList.add('hidden');
    }
  </script>
